<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benim Mini Tarayıcım</title>
    <style>
        /* Tarayıcı görünümü için tasarım ayarları */
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; /* Ekranın tamamını kapla */
        }
        #arac-cubugu { 
            background-color: #f1f3f4; 
            padding: 10px 20px; 
            display: flex; 
            gap: 10px; 
            border-bottom: 2px solid #ddd; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #url-girisi { 
            flex-grow: 1; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 20px; 
            font-size: 16px; 
            outline: none;
        }
        #url-girisi:focus {
            border-color: #1a73e8;
        }
        button { 
            padding: 10px 20px; 
            border: none; 
            background-color: #1a73e8; 
            color: white; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: bold;
        }
        button:hover { 
            background-color: #1557b0; 
        }
        /* Sitelerin görüneceği çerçeve */
        #tarayici-cercevesi { 
            flex-grow: 1; 
            border: none; 
            width: 100%; 
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <div id="arac-cubugu">
        <input type="text" id="url-girisi" placeholder="Gitmek istediğiniz adresi yazın (Örn: wikipedia.org)" value="https://www.wikipedia.org">
        <button onclick="siteyeGit()">Git</button>
    </div>

    <iframe id="tarayici-cercevesi" src="https://www.wikipedia.org"></iframe>

    <script>
        function siteyeGit() {
            let url = document.getElementById('url-girisi').value;
            
            // Eğer kullanıcı başına http veya https yazmadıysa otomatik ekle
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
                document.getElementById('url-girisi').value = url;
            }
            
            // iframe'in kaynağını yeni URL ile değiştir
            document.getElementById('tarayici-cercevesi').src = url;
        }

        // Kullanıcı 'Enter' tuşuna bastığında da çalışmasını sağla
        document.getElementById('url-girisi').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                siteyeGit();
            }
        });
    </script>

</body>
</html>
