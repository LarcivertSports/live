<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; }
        #player-container { width: 100%; max-width: 800px; margin-top: 20px; }
        video { width: 100%; border-radius: 8px; background: black; }
        #playlist { width: 100%; max-width: 800px; height: 400px; overflow-y: auto; margin-top: 20px; border: 1px solid #333; padding: 10px; border-radius: 8px; }
        .channel-item { padding: 10px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .channel-item:hover { background: #333; }
        h1 { color: #00d1b2; }
    </style>
</head>
<body>

    <h1>IPTV Player</h1>

    <div id="player-container">
        <video id="video" controls></video>
    </div>

    <div id="playlist">Kanal listesi yükleniyor...</div>

    <script>
        const m3uUrl = 'https://raw.githubusercontent.com/LarcivertSports/omercan/refs/heads/main/omarcan.m3u';
        const video = document.getElementById('video');
        const playlistEl = document.getElementById('playlist');

        // M3U dosyasını çek ve parçala
        async function fetchPlaylist() {
            try {
                const response = await fetch(m3uUrl);
                const data = await response.text();
                parseM3U(data);
            } catch (error) {
                playlistEl.innerText = "Liste yüklenirken hata oluştu (CORS engeli olabilir).";
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            let channels = [];
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF')) {
                    const name = lines[i].split(',')[1] || "Bilinmeyen Kanal";
                    const url = lines[i + 1]?.trim();
                    if (url) channels.push({ name, url });
                }
            }
            renderPlaylist(channels);
        }

        function renderPlaylist(channels) {
            playlistEl.innerHTML = '';
            channels.forEach(channel => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerText = channel.name;
                div.onclick = () => playStream(channel.url);
                playlistEl.appendChild(div);
            });
        }

        function playStream(url) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
        }

        fetchPlaylist();
    </script>
</body>
</html>
