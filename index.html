    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #player-container {
            flex: 2;
            display: flex;
            flex-direction: column;
            background-color: #000;
        }
        video {
            width: 100%;
            height: 100%;
            outline: none;
        }
        #playlist-container {
            flex: 1;
            background-color: #1e1e1e;
            overflow-y: auto;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
        }
        .playlist-header {
            padding: 15px;
            background-color: #2c2c2c;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #444;
        }
        .channel-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #333;
            transition: background 0.2s;
        }
        .channel-item:hover {
            background-color: #333;
        }
        .channel-item.active {
            background-color: #0056b3;
        }
        .channel-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
            margin-right: 15px;
            background-color: #fff;
            border-radius: 4px;
        }
        .channel-name {
            font-size: 14px;
        }
    </style>
</head>

        const channels = [];
        const lines = m3uData.split('\n');
        let currentChannel = {};

        // M3U Ayrıştırma
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (line.startsWith('#EXTINF')) {
                const nameMatch = line.match(/tvg-name="([^"]+)"/);
                const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                currentChannel.name = nameMatch ? nameMatch[1] : 'Bilinmeyen Kanal';
                currentChannel.logo = logoMatch ? logoMatch[1] : '';
            } else if (line.startsWith('http')) {
                currentChannel.url = line;
                channels.push(currentChannel);
                currentChannel = {};
            }
        }

        const channelListEl = document.getElementById('channel-list');
        const video = document.getElementById('video-player');
        let hls;

        // Oynatıcı Fonksiyonu
        function playChannel(url, element) {
            // Aktif sınıfını güncelle
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            if (Hls.isSupported()) {
                if (hls) hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            }
        }

        // Listeyi Ekrana Çizme
        channels.forEach((channel, index) => {
            const div = document.createElement('div');
            div.className = 'channel-item';
            
            const img = document.createElement('img');
            img.className = 'channel-logo';
            img.src = channel.logo || 'https://via.placeholder.com/40';
            img.onerror = function() { this.src = 'https://via.placeholder.com/40'; };
            
            const span = document.createElement('span');
            span.className = 'channel-name';
            span.textContent = channel.name;
            
            div.appendChild(img);
            div.appendChild(span);
            
            div.onclick = () => playChannel(channel.url, div);
            channelListEl.appendChild(div);

            // İlk kanalı otomatik başlat
            if (index === 0) {
                playChannel(channel.url, div);
            }
        });
