<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spor Kanalları - Canlı TV</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1a2035;
            --card-hover: #232b47;
            --text-color: #ffffff;
            --badge-bg: #ef4444;
            --border-color: #2a3045;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 1100px;
        }

        .channel-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-color);
            position: relative;
            transition: all 0.2s ease-in-out;
            aspect-ratio: 1 / 0.8;
            cursor: pointer;
        }

        .channel-card:hover {
            background-color: var(--card-hover);
            transform: scale(1.03);
            border-color: #3f4a6d;
        }

        .live-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: var(--badge-bg);
            color: white;
            font-size: 9px;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .channel-logo {
            width: 70%;
            height: auto;
            max-height: 45px;
            object-fit: contain;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
            margin-bottom: 10px;
        }

        .channel-name {
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #d1d5db;
        }

        @media (min-width: 600px) {
            .channel-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
            .channel-name { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="channel-grid" id="channelGrid">
        </div>

    <script>
        // Görseldeki kanal yapısına uygun 30 adet kanal verisi
        // Logoları internet üzerindeki şeffaf (PNG) kaynaklardan çektim
        const channels = [
            { name: "beIN SPORTS 1", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/BeIN_Sports_logo.svg/1200px-BeIN_Sports_logo.svg.png" },
            { name: "beIN SPORTS 2", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/BeIN_Sports_logo.svg/1200px-BeIN_Sports_logo.svg.png" },
            { name: "beIN SPORTS 3", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/BeIN_Sports_logo.svg/1200px-BeIN_Sports_logo.svg.png" },
            { name: "beIN SPORTS 4", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/BeIN_Sports_logo.svg/1200px-BeIN_Sports_logo.svg.png" },
            { name: "beIN SPORTS 5", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/BeIN_Sports_logo.svg/1200px-BeIN_Sports_logo.svg.png" },
            { name: "EXXEN 1", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/77/Exxen_logo.svg/1200px-Exxen_logo.svg.png" },
            { name: "EXXEN 2", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/77/Exxen_logo.svg/1200px-Exxen_logo.svg.png" },
            { name: "S SPORT", logo: "https://upload.wikimedia.org/wikipedia/commons/c/c3/S_Sport_logo.png" },
            { name: "S SPORT 2", logo: "https://upload.wikimedia.org/wikipedia/commons/c/c3/S_Sport_logo.png" },
            { name: "TV 8.5", logo: "https://upload.wikimedia.org/wikipedia/tr/c/cf/Tv8%2C5_logo.png" },
            { name: "TRT SPOR", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/TRT_Spor_logo.svg/1200px-TRT_Spor_logo.svg.png" },
            { name: "A SPOR", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/A_Spor_Logo.png/600px-A_Spor_Logo.png" },
            { name: "TİVİBU SPOR", logo: "https://upload.wikimedia.org/wikipedia/commons/7/7b/Tivibu_logo.png" },
            { name: "SMART SPOR", logo: "https://upload.wikimedia.org/wikipedia/tr/thumb/6/64/Smart_Spor_logo.png/300px-Smart_Spor_logo.png" },
            { name: "EUROSPORT 1", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Eurosport_logo.svg/1200px-Eurosport_logo.svg.png" }
        ];

        // 30 kanalı tamamlamak için listeyi çoğaltıyoruz (test için)
        const fullList = [...channels, ...channels]; 

        const grid = document.getElementById('channelGrid');

        fullList.slice(0, 30).forEach((channel, index) => {
            const card = document.createElement('a');
            card.href = "#"; // İframe için burayı sonra bağlayabilirsin
            card.className = 'channel-card';
            card.innerHTML = `
                <span class="live-badge">CANLI</span>
                <img src="${channel.logo}" alt="${channel.name}" class="channel-logo">
                <div class="channel-name">${channel.name}</div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
